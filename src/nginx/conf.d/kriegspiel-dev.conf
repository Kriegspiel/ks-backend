upstream app_upstream {
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    limit_req_status 429;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_pass http://app_upstream/health;
    }

    location /api/ {
        limit_req zone=api_ratelimit burst=30 nodelay;
        limit_conn api_connlimit 50;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_pass http://app_upstream;
    }

    location /auth/ {
        limit_req zone=auth_ratelimit burst=10 nodelay;
        limit_conn api_connlimit 20;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        rewrite ^/auth/(.*)$ /auth/$1 break;
        proxy_pass http://app_upstream;
    }

    location ~* \.(?:css|js|mjs|map|ico|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, immutable";
        try_files $uri =404;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
