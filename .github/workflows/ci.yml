name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  TZ: UTC

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            src/app/requirements.txt
            src/app/requirements-dev.txt
      - name: Install backend dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r src/app/requirements-dev.txt
      - name: Backend tests
        run: ./scripts/regression/backend-regression.sh
